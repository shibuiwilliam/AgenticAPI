# Publish to PyPI when a GitHub Release is created.
#
# Setup (one-time):
#   1. Go to https://pypi.org → Account Settings → Publishing →
#      "Add a new pending publisher"
#   2. Fill in:
#        PyPI project name:  agentharnessapi
#        Owner:              shibuiwilliam
#        Repository:         AgenticAPI
#        Workflow name:      publish.yml
#        Environment name:   pypi
#   3. Go to GitHub repo → Settings → Environments → New environment
#      named "pypi" (this gates the deployment with a manual approval
#      if you add a reviewer, or runs automatically if you don't).
#
# Usage:
#   1. Bump `version` in pyproject.toml and commit.
#   2. Create a GitHub Release (tag: v0.1.0, title: v0.1.0).
#   3. This workflow builds, runs the full test suite, then publishes.
#
# The workflow uses PyPI's "Trusted Publisher" (OIDC) — no API tokens
# or passwords are stored in GitHub Secrets.

name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  # ── Gate: full CI must pass before publishing ──────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: uv sync --group dev
      - run: uv run ruff format --check src/ tests/ examples/
      - run: uv run ruff check src/ tests/ examples/
      - run: uv run mypy src/agenticapi/
      - run: uv run pytest --ignore=tests/benchmarks --ignore=tests/e2e -q

  # ── Build sdist + wheel ────────────────────────────────────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Publish to PyPI via Trusted Publisher (OIDC) ───────────────────
  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi                    # GitHub environment for deployment protection
    permissions:
      id-token: write                    # required for OIDC / Trusted Publisher
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        # No credentials needed — uses OIDC Trusted Publisher.
        # To publish to TestPyPI first, uncomment:
        # with:
        #   repository-url: https://test.pypi.org/legacy/

  # ── (Optional) Publish to TestPyPI on pre-releases ─────────────────
  publish-test:
    if: github.event.release.prerelease
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
