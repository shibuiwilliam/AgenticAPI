repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      # Format in-place (no --check) so you can re-stage and commit.
      # Matches: ci.yml  `ruff format --check src/ tests/ examples/`
      # Matches: publish.yml `ruff format --check src/ tests/ examples/`
      - id: ruff-format
        args: [src/, tests/, examples/]
        pass_filenames: false
      # Lint with auto-fix; fail if fixes were applied so you re-stage.
      # Matches: ci.yml  `ruff check src/ tests/ examples/`
      # Matches: publish.yml `ruff check src/ tests/ examples/`
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix, src/, tests/, examples/]
        pass_filenames: false

  # Type-check the source package.
  # Matches: ci.yml  `mypy src/agenticapi/`
  # Matches: publish.yml `mypy src/agenticapi/`
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.0
    hooks:
      - id: mypy
        args: [src/agenticapi/]
        pass_filenames: false
        additional_dependencies:
          - pydantic>=2.12.5
          - starlette>=1.0.0
          - structlog>=25.5.0
          - httpx>=0.28.1
          - openai>=2.30.0
          - anthropic>=0.89.0
          - google-genai>=1.70.0
          - python-multipart>=0.0.20
          - uvicorn>=0.34.0
          - mcp>=1.27.0
          - claude-agent-sdk>=0.1.58
